<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora — Pair</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">  <div class="w-full max-w-md p-6"><!-- Card -->
<div class="bg-zinc-900 rounded-3xl p-6 shadow-2xl border border-zinc-800">

  <h1 class="text-xl font-semibold text-center mb-2">Nexora Pairing</h1>
  <p class="text-zinc-400 text-sm text-center mb-6">Connect your bot in seconds</p>

  <!-- QR -->
  <div class="flex justify-center mb-6">
    <div class="bg-white p-3 rounded-2xl">
      <img id="qrImage" class="w-48 h-48 hidden" />
      <div id="qrPlaceholder" class="text-black text-sm text-center">Loading QR...</div>
    </div>
  </div>

  <!-- Phone Input -->
  <div class="mb-4">
    <label class="text-xs text-zinc-400">Phone Number</label>
    <input id="phoneInput" placeholder="e.g. 2637XXXXXXXX" class="w-full mt-1 bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm outline-none focus:border-indigo-500" />
  </div>

  <!-- Code -->
  <div class="text-center mb-6">
    <p class="text-zinc-400 text-xs mb-1">PAIRING CODE</p>
    <div id="pairCode" class="text-3xl font-mono tracking-widest">—</div>
  </div>

  <!-- Status -->
  <div class="text-center mb-4 text-sm text-zinc-400" id="status">
    Checking session...
  </div>

  <!-- Actions -->
  <div class="flex gap-2">
    <button id="refreshBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 rounded-xl py-2 text-sm">
      Refresh
    </button>
    <button id="copyBtn" class="flex-1 bg-zinc-800 hover:bg-zinc-700 rounded-xl py-2 text-sm">
      Copy Code
    </button>
  </div>

</div>

  </div><script>
async function refresh(){
  try{
    const r = await fetch('/status')
    const j = await r.json()
    document.getElementById('status').textContent = j.hasSession ? '✅ Connected' : '❌ Not connected'
  }catch(e){
    document.getElementById('status').textContent = 'error'
  }

  try {
    const r2 = await fetch('/qr')
    const qj = await r2.json()
    const img = document.getElementById('qrImage')
    const ph = document.getElementById('qrPlaceholder')

    if (qj.ok && qj.dataUrl) {
      img.src = qj.dataUrl
      img.classList.remove('hidden')
      ph.style.display = 'none'
    } else {
      img.classList.add('hidden')
      ph.style.display = 'block'
      ph.textContent = 'QR not available'
    }
  } catch(e) {
    document.getElementById('qrPlaceholder').textContent = 'QR error'
  }

  try {
    const phone = document.getElementById('phoneInput').value.trim()
    const r3 = await fetch('/pairing?number=' + encodeURIComponent(phone))
    const pj = await r3.json()
    document.getElementById('pairCode').textContent = (pj.ok && pj.code) ? pj.code : '—'
  } catch(e) {
    document.getElementById('pairCode').textContent = 'error'
  }
}

refresh()
setInterval(refresh, 4000)

document.getElementById('refreshBtn').addEventListener('click', refresh)

// Optional: auto refresh when number changes
document.getElementById('phoneInput').addEventListener('change', refresh)

document.getElementById('copyBtn').addEventListener('click', ()=>{
  const code = document.getElementById('pairCode').textContent
  if(code && code !== '—'){
    navigator.clipboard.writeText(code)
    document.getElementById('copyBtn').textContent = 'Copied ✔'
    setTimeout(()=>document.getElementById('copyBtn').textContent='Copy Code',1500)
  }
})
</script></body>
</html>
